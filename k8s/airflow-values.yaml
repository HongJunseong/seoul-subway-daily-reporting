# Airflow Helm Chart values for seoul-subway-daily-reporting

# KubernetesExecutor: 태스크마다 Pod 생성
executor: KubernetesExecutor

# 커스텀 이미지 (Java + requirements.txt 포함)
images:
  airflow:
    repository: ssdr-airflow
    tag: latest
    pullPolicy: Never

# 환경변수: Secret에서 주입 (string 형식)
extraEnvFrom: |
  - secretRef:
      name: ssdr-secrets

env:
  - name: PYTHONPATH
    value: "/opt/airflow"

# git-sync: GitHub에서 DAGs 자동 동기화
dags:
  gitSync:
    enabled: true
    repo: https://github.com/HongJunseong/seoul-subway-daily-reporting.git
    branch: main
    rev: HEAD
    depth: 1
    maxFailures: 3
    subPath: dags

# src 마운트용 공통 설정
_gitSyncSrcVolume: &gitSyncSrcVolume
  - name: repo-src
    emptyDir: {}

_gitSyncSrcMount: &gitSyncSrcMount
  - name: repo-src
    mountPath: /opt/airflow/src

_gitSyncSrcInit: &gitSyncSrcInit
  - name: git-clone-src
    image: alpine/git:latest
    command:
      - sh
      - -c
      - |
        git clone --depth 1 --branch main \
          https://github.com/HongJunseong/seoul-subway-daily-reporting.git /tmp/repo && \
        cp -r /tmp/repo/src/. /opt/airflow/src/
    volumeMounts:
      - name: repo-src
        mountPath: /opt/airflow/src

# Scheduler
scheduler:
  extraVolumes: *gitSyncSrcVolume
  extraVolumeMounts: *gitSyncSrcMount
  extraInitContainers: *gitSyncSrcInit

# Webserver
webserver:
  extraVolumes: *gitSyncSrcVolume
  extraVolumeMounts: *gitSyncSrcMount
  extraInitContainers: *gitSyncSrcInit
  service:
    type: NodePort
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: 8080
        nodePort: 30080

# Triggerer
triggerer:
  extraVolumes: *gitSyncSrcVolume
  extraVolumeMounts: *gitSyncSrcMount
  extraInitContainers: *gitSyncSrcInit

# KubernetesExecutor 태스크 Pod 설정
workers:
  extraVolumes: *gitSyncSrcVolume
  extraVolumeMounts: *gitSyncSrcMount
  extraInitContainers: *gitSyncSrcInit

# PostgreSQL 내장 사용
postgresql:
  enabled: true
  image:
    tag: "latest"
    pullPolicy: Never

# KubernetesExecutor는 Redis 불필요
redis:
  enabled: false

# Webserver 시크릿 키
webserverSecretKey: "seoul-subway-secret-key"

# 공유 로그 PVC: webserver + 태스크 Pod가 같은 볼륨에 로그 저장
logs:
  persistence:
    enabled: true
    size: 5Gi
