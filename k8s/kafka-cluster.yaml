---
# KafkaNodePool: 브로커 + 컨트롤러 역할을 하나의 노드가 담당 (KRaft 모드)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: ssdr-kafka-pool
  namespace: kafka
  labels:
    strimzi.io/cluster: ssdr-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
# Kafka 클러스터 (KRaft 모드 - ZooKeeper 없음)
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: ssdr-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      auto.create.topics.enable: "true"
  entityOperator:
    topicOperator: {}
    userOperator: {}
